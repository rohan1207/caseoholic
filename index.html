<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary Meta ── -->
    <title>Caseoholic | Premium Phone Cases, AirPods Cases, Watch Bands & Wallets</title>
    <meta name="description" content="Shop premium phone cases, AirPods cases, watch bands, and phone wallets at Caseoholic. Handpicked tech accessories where craftsmanship meets everyday carry." />
    <meta name="keywords" content="phone cases, airpods cases, watch bands, phone wallets, tech accessories, premium phone cases, caseoholic, protective cases, mobile covers" />
    <meta name="author" content="Caseoholic" />
    <meta name="theme-color" content="#0f0f0f" />
    <meta name="robots" content="index, follow" />

    <!-- ── Open Graph (Facebook, WhatsApp, LinkedIn) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Caseoholic" />
    <meta property="og:title" content="Caseoholic | Premium Tech Accessories" />
    <meta property="og:description" content="Handpicked phone cases, AirPods cases, watch bands & wallets — where premium craftsmanship meets everyday carry." />
    <meta property="og:url" content="https://caseoholic.in" />
    <meta property="og:image" content="/logo.png" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Caseoholic | Premium Tech Accessories" />
    <meta name="twitter:description" content="Handpicked phone cases, AirPods cases, watch bands & wallets — where premium craftsmanship meets everyday carry." />
    <meta name="twitter:image" content="/logo.png" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/png" href="/logo.png" />

    <!-- ── Google Fonts: premium display + UI ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />

    <!-- ── Critical inline styles (pre-paint, prevents flash) ── -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html {
        font-size: 16px;
        -webkit-text-size-adjust: 100%;
        scroll-behavior: auto;
      }

      body {
        background: #fafaf9;
        font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
        color: #1c1917;
        margin: 0;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }

      /* Brand selection highlight */
      ::selection {
        background: rgba(180, 83, 9, 0.18);
        color: #1c1917;
      }

      /* Prevent layout shift while fonts load */
      #root {
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
